- name: subrmpcgain
  signature: subrmpcgain(CVRTAG,MVRTAG)
  parameters:
  - name: CVRTAG
    description: CV to be used
    direction: in
    datatype:
    - cvr
    arity: '1'
  - name: MVRTAG
    description: Mv/Dv to be used
    direction: in
    datatype:
    - mvr
    - dvr
    arity: '1'
  retr: "the current steady state gain from the Mvr to the Cvr if (CVRTAG is a Cvr)\
    \ and (MVRTAG is an MVR)\r\n  and (CVRTAG and MVRTAG belongs to same appl) and\
    \ (appl is SmpcAppl/NMPCAppl) and (the model is an SubrModl), else 0"
  detailedDescription: "Get the steady state gain from the MPC using a SUBR type model.\
    \ The pair of CVRTAG/MVRTAG identifies which\r\n  model gain to fetch."
  quality: GOOD if calculations are ok, else BAD
- name: subrzerosens
  signature: subrzerosens(CVRTAG,MVRTAG,ZEROFLAG)
  parameters:
  - name: CVRTAG
    description: CV to be used
    direction: in
    datatype:
    - cvr
    arity: '1'
  - name: MVRTAG
    description: MV to be used
    direction: in
    datatype:
    - mvr
    arity: '1'
  - name: ZEROFLAG
    description: value 1 means that it is zeroed, 0 means not zeroed
    direction: in
    datatype:
    - value
    arity: '1'
  retr: "if (CVRTAG is a Cvr) and (MVRTAG is an MVR) and (CVRTAG and MVRTAG belongs\
    \ to same appl) and (appl is\r\n  SmpcAppl/NMPCAppl) and (the model is a SubrModl),\
    \ then the corr element of ZeroSensitivity is set according to\r\n  ZEROFLAG (1\
    \ means that it is zeroed), else 0"
  detailedDescription: "Set element of matrix ZeroSensitivity to 1/0 in the MPC using\
    \ a SUBR type model<br>\r\n  Typical use: Zero sensitivity to avoid undesired\
    \ use of Mvr/Cvr connection. The pair of CVRTAG/MVRTAG identifies the\r\n  sensitivity\
    \ element to set."
  quality: GOOD if calculations are ok, else BAD
