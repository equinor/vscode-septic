- name: neqsimjcafiv
  signature: neqsimjcafiv()
  parameters:
  - name: Slot
    description: "Slot-index 1-32. Which slot to use for the calculation. Each well\
      \ should use a dedicated and unique\r\n  slot."
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Mode
    description: "Calc mode 0-2. 0=execute NeqSim calculation thread, 1=get last calculated\
      \ Frms, 2=get last\r\n  calculated F_rms_max"
    direction: in
    datatype:
    - value
    arity: '1'
  - name: FluidID
    description: Fluid index 0-3. 0=default, 1= Skrugard, 2= Havis, 3= Drivis
    direction: in
    datatype:
    - value
    arity: '?'
  - name: Qg
    description: Gas rate std >= 0 [Sm3/h]
    direction: in
    datatype:
    - value
    arity: '?'
  - name: Qo
    description: Oil rate std >= 0 [Sm3/h]
    direction: in
    datatype:
    - value
    arity: '?'
  - name: Qw
    description: Water rate std >= 0 [Sm3/h]
    direction: in
    datatype:
    - value
    arity: '?'
  - name: PT
    description: Pressure >= 0 [barg]
    direction: in
    datatype:
    - value
    arity: '?'
  - name: TT
    description: Temperature >= -100 [degC]
    direction: in
    datatype:
    - value
    arity: '?'
  - name: A
    description: Pipe cross section area > 0.003 [m2]
    direction: in
    datatype:
    - value
    arity: '?'
  retr: "Mode 0: Time spent performing the calculation. Mode > 0: Output variables\
    \ from last valid result as defined\r\n  above."
  detailedDescription: "Calculates liquid and gas rates at downstream choke conditions\
    \ (flash) and returns current Frms and the max\r\n  acceptable Frms.<br>\r\n\r\
    \n  The calculation is a NeqSim routine that runs in a Graal isolate. The time\
    \ to complete one calc is around 100ms, but\r\n  can vary widely. Therefore the\
    \ Graal isolate routine is run in a separate thread.\r\n\r\n  The calc has three\
    \ modes, selectable with the input parameter \"Mode\".\r\n  - Mode = 0: The calculation\
    \ is initiated unless it is already running. If already running, nothing is done.\
    \ The\r\n  returned value in mode 0 is the time spent so far in the thread. If\
    \ the thread has completed, the calculated values\r\n  are available using modes\
    \ 1 and 2, and a new calculation is initiated.\r\n  - Mode = 1: The last calculated\
    \ Frms is returned.\r\n  - Mode = 2: The last calculated F_rms_max is returned."
  quality: 'Mode 0: GOOD if all inputs are GOOD, else BAD. Mode > 0: GOOD if the last
    NeqSim calculation succeeded.'
- name: neqsimraia
  signature: neqsimraia()
  parameters:
  - name: Mode
    description: Calc mode -1 to 6. Positive values return results.
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Qpda
    description: PDA flow rate [kg/h]
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Qseat
    description: Seat flow rate [kg/h]
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Qgavea
    description: Gavea flow rate [kg/h]
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Treboiler
    description: NGL column reboiler temperature [degC]
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Theater
    description: 4th stg heater temperature [degC]
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Pexpander
    description: Expander outlet pressure [bara]
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Nexchangers
    description: Number of heat exchangers in dew point process [1 or 2]
    direction: in
    datatype:
    - value
    arity: '1'
  retr: Time spent performing the calculation if Mode <= 0, output variables as defined
    above otherwise.
  detailedDescription: "Calculates mass balance error, TVP and RVP for export oil,\
    \ dewpoint temperature for export gas,\r\n  methane content in export gas and\
    \ the Wobbe index.<br>\r\n\r\n  The calculation is a NeqSim routine that runs\
    \ in a Graal isolate. The time to complete one calc is around 45s, but\r\n  can\
    \ vary widely. Therefore the Graal isolate routine is run in a separate thread.\r\
    \n\r\n  The calc has eight modes, selectable with the input parameter \"Mode\"\
    .\r\n  - Mode = -1: Detach the running thread and restart the calculation with\
    \ updated input parameters. The detached\r\n  calculation thread will keep running\
    \ until it (eventually) completes. Be careful doing this since it may tie up\r\
    \n  the CPU if running many parallel simulations.\r\n  - Mode = 0: The calculation\
    \ is initiated unless it is already running. If already running, nothing is done.\
    \ The\r\n  returned value in mode 0 is the time spent so far in the thread. If\
    \ the thread has completed, the calculated values\r\n  are available using modes\
    \ 1-6, and a new calculation is initiated.\r\n  - Mode = 1: Return mass balance\
    \ error [%]\r\n  - Mode = 2: Return TVP for export oil [bara]\r\n  - Mode = 3:\
    \ Return RVP for export oil [bara]\r\n  - Mode = 4: Return dewpoint temperature\
    \ for export gas [degC]\r\n  - Mode = 5: Return methane content in export gas\
    \ [mol%]\r\n  - Mode = 6: Return Wobbe index of export gas [MJ/m3]"
  quality: GOOD
- name: not
  signature: not(x)
  parameters:
