    - value
    arity: '?'
  retr: Difference between samples
  detailedDescription: Calculates difference between to consequent samples in a buffer.
  quality: GOOD if valid Xvr or Xvr.Mmbr
- name: distmix
  signature: distmix(recinp, recoutp, ns, f1, t1, s1, ..., fN, tN, sN)
  parameters:
  - name: recinp
    description: Recovery point for input temperatures (e.g.95%)
    direction: in
    datatype:
    - value
    arity: '1'
  - name: recoutp
    description: Recovery point for output result (e.g. 85% or 95%)
    direction: in
    datatype:
    - value
    arity: '1'
  - name: ns
    description: Number of streams in mix
    direction: in
    datatype:
    - value
    arity: '1'
  - name: fN
    description: Flow of stream n [m3/h]
    direction: in
    datatype:
    - value
    arity: $ns
  - name: tN
    description: Temperature for specified recinp for stream n
    direction: in
    datatype:
    - value
    arity: $ns
  - name: sN
    description: Slope [% recovered/C] around Tn
    direction: in
    datatype:
    - value
    arity: $ns
  retr: Calulated temperature at which the mix is RECOUTP distilled
  detailedDescription: Calculate mix distillation temperature at specified % REC of
    mix
  quality: GOOD if all parameters are supplied and GOOD, else BAD (Volumes smaller
    than 5 % will not affect quality)
- name: dumpXvrs
  signature: dumpXvrs(x)
  parameters: []
  retr: x
  detailedDescription: Dumps Application Ids and Xvrs Ids to file 'dumpxvrs.txt'.
    Actual dump controlled by parameter
  quality: GOOD
- name: escgrad
  signature: escgrad(J,sine,THP,TLP,Ts,sineOn)
  parameters:
  - name: J
    description: '- Measured cost'
    direction: in
    datatype:
    - value
    arity: '1'
  - name: sine
    description: '- Sinusoidal perturbation signal: sin(2*pi*N*Ts/Tp)'
    direction: in
    datatype:
    - value
    arity: '1'
  - name: THP
    description: '- High pass filter cut-off time'
    direction: in
    datatype:
    - value
    arity: '1'
  - name: TLP
    description: '- Low pass filter cut-off time'
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Ts
    description: '- Sampling time'
    direction: in
    datatype:
    - value
    arity: '1'
  - name: THP
    description: '- sineOn - Set > 0 if sine wave is active (else calc returns 0)'
    direction: in
    datatype:
    - value
    arity: '1'
  retr: "Gradient multiplied by a/2, thus multiply by 2/a to get a correct value of\
    \ gradient. Calculated quality of\r\n  mix, 0 if sum of volumes = 0"
  detailedDescription: Implements a gradient estimator based on Extremum seeking algorithm
    in discrete time domain
  quality: GOOD if all supplied parameters are GOOD
- name: exp
  signature: exp(x)
  parameters:
  - name: x
    description: Value
    direction: in
    datatype:
    - value
    arity: '1'
  retr: The exponential for x
  detailedDescription: Computes the exponential with base e
  quality: quality(x)
- name: exprprocmodsched
  signature: exprprocmodsched(cvr, xvr, gain, lag1, lag2, lead1, delay, apply)
  parameters:
  - name: cvr
    description: Cvr
    direction: in
    datatype:
    - cvr
    arity: '1'
  - name: xvr
    description: Mvr or Dvr
    direction: in
    datatype:
    - mvr
    - dvr
    arity: '1'
  - name: gain
    description: Gain modifier to be used
    direction: in
    datatype:
    - value
    arity: '1'
  - name: lag1
    description: First time constant for model
    direction: in
    datatype:
    - value
    arity: '1'
  - name: lag2
    description: Second time constant for model
    direction: in
    datatype:
    - value
    arity: '1'
  - name: lead1
    description: Time constant of the lead term (used to generate inverse response
      and overshoot)
    direction: in
    datatype:
    - value
    arity: '1'
  - name: delay
    description: Dead time
    direction: in
    datatype:
    - value
    arity: '1'
  - name: apply
    description: Flag for allowing update (1)
    direction: in
    datatype:
    - value
    arity: '1'
  retr: Value of apply paramter
  detailedDescription: "Construct the experimental model for use in ExprProc simulator\
    \ from parameters. Cvr and Mvr/Dvr needs to be\r\n  contained in same SmpcAppl/MPCAppl/NMPCAppl.\r\
    \n  The Laplace transform model is y/u = (1 + lead1*s)*exp(-delay*s)/(1 + lag1*s)(1\
    \ + lag2*s) where lead1, delay, lag1 and\r\n  lag2 are given in minutes."
  quality: GOOD if valid model between cvr and xvr, and all inputs are GOOD, else
    BAD
- name: exprprocmodset
  signature: exprprocmodset(CVRTAG,IVRTAG,Scale,Apply)
  parameters:
  - name: CVRTAG
    description: CV for model identification
    direction: in
    datatype:
    - value
    arity: '1'
  - name: IVRTAG
    description: MV/DV for model identification
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Scale
    description: is the gain modifier to use, Scale is not changed when quality(Scale)
      or quality(Apply) is BAD
    direction: in
    datatype:
    - value
    arity: '1'
  - name: Apply
    description: = 1 commands to set Scale, any other value gives an unaffected Scale
    direction: in
    datatype:
    - value
    arity: '1'
  retr: "steady state gain, of the scaled Amodl if CV and IV belongs to same SmpcAppl/MPCAppl/NMPCAppl\
    \ with an ExprModl\r\n  and Amodl exists, else 0"
  detailedDescription: Set the gain modifier in the active experimental model (ExprIvr.Scale)
    of ExprProc
  quality: GOOD if CV and IV belongs to same SmpcAppl/MPCAppl/NMPCAppl with an ExprModl
    and Amodl exists, else BAD
- name: filt
  signature: filt(rawmeas, tau, reset)
