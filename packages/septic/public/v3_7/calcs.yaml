  parameters:
  - name: condn
    description: Conditions to evaluate
    direction: in
    datatype:
    - value
    arity: +
  - name: exprn
    description: Expressions to evaluate when condition is true
    direction: in
    datatype:
    - value
    arity: =condN
  - name: exprf
    description: Expression to evaluate when condition is false
    direction: in
