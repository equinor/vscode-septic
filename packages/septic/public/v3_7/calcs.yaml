    \ is BAD"
  detailedDescription: "Evaluate bool cond's and perform corresponding expressions.\
    \ Expect odd number of arguments >= 3\r\n  NB! The ifelif calc does not perform\
    \ unselected expressions anymore (Nov 2024, versions after 3.0.1)"
  quality: "GOOD if number of arguments is odd and >= 3 and all cond's and selected\
    \ expressions up to and including the\r\n  last (returned) evaluated expression\
    \ are GOOD, else BAD."
