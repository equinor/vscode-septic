- name: modsched
  signature: modsched(cvr, xvr, gain, lag1, lag2, lead1, delay, apply)
  parameters:
  - name: cvr
    description: Cvr
    direction: in
    datatype:
    - cvr
    arity: '1'
  - name: xvr
    description: Mvr or Dvr
    direction: in
