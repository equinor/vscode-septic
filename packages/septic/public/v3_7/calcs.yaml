    - value
    arity: '1'
  - name: lag2
    description: Second time constant for model
    direction: in
    datatype:
    - value
    arity: '1'
  - name: lead1
    description: Time constant of the lead term (used to generate inverse response
      and overshoot)
    direction: in
    datatype:
    - value
    arity: '1'
  - name: delay
    description: Dead time
    direction: in
    datatype:
    - value
    arity: '1'
  - name: apply
    description: Flag for allowing update (1)
    direction: in
    datatype:
    - value
    arity: '1'
  retr: Update the model between given cvr and xvr
  detailedDescription: "Construct the experimental model from parameters. Cvr and\
    \ Mvr/Dvr needs to be contained in same\r\n  SmpcAppl/MPCAppl/NMPCAppl. The Laplace\
    \ transform model is y/u = (1 + lead1*s)*exp(-delay*s)/(1 + lag1*s)(1 + lag2*s)\r\
    \n  where lead1, delay, lag1 and lag2 are given in minutes."
  quality: GOOD if valid model between cvr and xvr
